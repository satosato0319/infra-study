<!doctype html>
<html lang="ja">
<head>

  <title>Button</title>
</head>
<body>
  <h1>ログ確認サイト</h1>
　<!-- ボタン1:アクセスログ -->

  </form>

　<br>

　<!-- ボタン2:エラーログ -->
  <form method="get" action="/api/logs/error">
    <button type="submit">error log</button>
  </form>
</body>
